format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$golang\
$nodejs\
$ruby\
$rust\
$cmd_duration\
$line_break\
$character"""

[username]
show_always = false
style_user = "bold blue"

[hostname]
ssh_only = true
style = "bold dimmed white"

[directory]
truncation_length = 3
truncation_symbol = ".../"
style = "bold cyan"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[golang]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold green"

[ruby]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold red"

[rust]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold orange"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
